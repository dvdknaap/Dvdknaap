name: Generate Contribution Snake

# Builds an animated SVG of a snake eating the contribution graph and pushes
# it to the `output` branch, where the README references it via raw URL.

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # allow manual runs from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs (dark + light)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#00ff41&color_dots=#0d160d,#0e4429,#006d32,#26a641,#39d353
            dist/snake-light.svg?palette=github-light&color_snake=#006d32

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
